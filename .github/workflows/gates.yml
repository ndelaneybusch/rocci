name: gates

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: gates-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    # Docs-only detection must live at the job level, not in workflow-level
    # `paths-ignore`: branch protection counts a job skipped by `if:` as
    # satisfied, but a workflow that never triggers never reports its checks,
    # leaving required checks "Expected" and blocking the merge forever.
    name: changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@v3
        if: github.event_name == 'pull_request'
        id: filter
        with:
          # With `every`, a changed file counts as code only if it matches
          # all patterns, i.e. is none of the documentation shapes below;
          # `code` is true when at least one such file changed.
          predicate-quantifier: every
          filters: |
            code:
              - "!docs/**"
              - "!**.md"
              - "!LICENSE"
              - "!CITATION.cff"

  calibration:
    name: calibration
    needs: changes
    # Pushes to main always run (the filter step is PR-only, so its output
    # is empty there); PRs run only when non-docs files changed.
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # The suite runs in ~16 s on a desktop, so
    # the timeout is a hang backstop, not headroom.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - run: uv sync --all-groups
      - run: uv run maturin develop --release
      - run: just calibration

  perf:
    name: perf
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          path: pr
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - uses: Swatinem/rust-cache@v2
        with:
          # The cargo workspace root (and its target/) is the repo root, not
          # the crate directory.
          workspaces: pr
      - name: Benchmark PR revision
        working-directory: pr
        run: |
          uv sync --all-groups
          uv run maturin develop --release
          uv run python benchmarks/run_benchmarks.py --repeats 5 --json perf-pr.json

      - uses: actions/checkout@v7
        if: github.event_name == 'pull_request'
        with:
          # Pin to the SHA recorded on the event, not the branch name: if main
          # advances while this job queues, a moving ref would credit/blame
          # the PR for unrelated changes.
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
      - name: Benchmark base revision
        if: github.event_name == 'pull_request'
        working-directory: base
        run: |
          uv sync --all-groups
          uv run maturin develop --release
          # Drive the base's installed rocci with the PR's runner, not the
          # base's: the comparison must use one measurement harness against two
          # libraries, and the base predates the runner's --json flag anyway.
          uv run python ../pr/benchmarks/run_benchmarks.py --repeats 5 --json perf-base.json

      - name: Compare PR against base
        if: github.event_name == 'pull_request'
        working-directory: pr
        run: |
          uv run python benchmarks/run_benchmarks.py \
            --from-json perf-pr.json \
            --compare-json ../base/perf-base.json \
            --relative-tolerance 0.30 \
            --strict

      - name: Report main performance
        if: github.event_name != 'pull_request'
        working-directory: pr
        run: uv run python benchmarks/run_benchmarks.py --from-json perf-pr.json
