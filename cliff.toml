# git-cliff configuration. CHANGELOG.md is generated from squash-merged
# Conventional Commit PR titles at release time via `just release-prep X.Y.Z`

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.
Generated by [git-cliff](https://git-cliff.org) at release time; do not edit
release sections by hand.
"""
body = """
{% if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\
"""
trim = true

[git]
conventional_commits = true
# Non-conforming commits (pre-convention history) are excluded rather than
# dumped in an "Other" bucket — the changelog carries signal only.
filter_unconventional = true
protect_breaking_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
commit_parsers = [
    # The release PR itself and dependency-bump noise carry no user-facing news.
    { message = "^release", skip = true },
    { message = "^(build|chore)\\(deps\\)", skip = true },
    # HTML-comment prefixes order the groups; striptags removes them on render.
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug fixes" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^docs", group = "<!-- 3 -->Documentation" },
    { message = "^refactor", group = "<!-- 4 -->Refactoring" },
    { message = "^test", group = "<!-- 5 -->Testing" },
    { message = "^(build|ci)", group = "<!-- 6 -->Build & CI" },
    { message = "^style", group = "<!-- 7 -->Style" },
    { message = "^chore", group = "<!-- 8 -->Chores" },
    { message = "^revert", group = "<!-- 9 -->Reverts" },
]
